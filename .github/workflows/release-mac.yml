name: macOS Release
on:
  workflow_dispatch:
  push:
    tags: ["v*"]
jobs:
  package:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: npm ci
      - run: python -m pip install pyinstaller
      - run: npm run native:mac
      - run: pyinstaller sidecar/orbit-retrieval.spec --distpath release-sidecar --workpath build/pyinstaller
      - run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release/*
      - uses: actions/upload-artifact@v4
        with:
          name: Orbit-macOS
          path: release/*
